packages:
  - artifacts/*
  - scripts

# Forward-compatible form of onlyBuiltDependencies below (pnpm >=10.26 reads allowBuilds;
# pnpm 11 removes onlyBuiltDependencies entirely). Keep the two lists in sync.
allowBuilds:
  '@swc/core': true
  esbuild: true
  msw: true
  unrs-resolver: true

autoInstallPeers: false

# Install native optional dependencies for the current developer machine and linux-x64-glibc
# CI/deploys. This replaces the older override list that removed every non-Linux native package,
# which made Windows local installs unable to provide Vite/Vitest/esbuild binaries.
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
  libc:
    - current
    - glibc

catalog:
  '@tailwindcss/vite': 4.2.1
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': 5.1.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: 4.21.0
  vite: 7.3.6
  vitest: ^3.2.6
  zod: ^3.25.76

minimumReleaseAge: 1440

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  # Patch a transitive fast-uri (via ajv) off the range flagged by GHSA-v2hh-gcrm-f6hx
  # (host confusion via a literal backslash authority delimiter); 3.1.4 is the fix.
  'fast-uri@>=3.0.0 <=3.1.3': 3.1.4
  # Patch a transitive postcss (via tailwindcss/vite) off the range flagged by
  # GHSA-r28c-9q8g-f849 (path traversal in sourceMappingURL auto-loading -> arbitrary
  # .map disclosure); fixed in 8.5.18, pinned to the latest mature 8.5.x patch.
  'postcss@<=8.5.17': 8.5.22
  # Patch transitive brace-expansion off the range flagged by GHSA-mh99-v99m-4gvg (DoS via
  # unbounded expansion length -> out-of-memory crash). 5.0.8 is the only patched release; its
  # `expand` API is unchanged and it still ships a CommonJS build via its exports map, so the
  # older 2.x consumers keep working.
  'brace-expansion@<=5.0.7': 5.0.8
  '@esbuild-kit/esm-loader': npm:tsx@^4.21.0
  '@expo/ngrok-bin>@expo/ngrok-bin-darwin-arm64': '-'
  '@expo/ngrok-bin>@expo/ngrok-bin-darwin-x64': '-'
