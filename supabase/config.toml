# Internal cron-only endpoint invoked by pg_net from a pg_cron schedule (see
# supabase/migrations/20260705061816_notification_delivery_engine.sql) -- pg_net has no way to
# supply a user JWT. The function takes no caller-supplied parameters and always processes the
# same system-wide pending queue regardless of caller, so this is not a data-exposure risk.
[functions.dispatch-notifications]
verify_jwt = false

# Same reasoning as dispatch-notifications -- monthly pg_cron-invoked ingestion job, no
# caller-supplied parameters, always re-ingests the same public dataset and re-scans the full
# roster regardless of caller.
[functions.screen-exclusions]
verify_jwt = false

# Same reasoning as dispatch-notifications -- pg_cron-invoked HeyGen status-polling job (every 5
# minutes, see supabase/migrations/20260705211500_schedule_heygen_video_status_polling.sql), no
# caller-supplied parameters, always re-polls the same system-wide non-terminal video job queue
# regardless of caller.
[functions.poll-heygen-video-statuses]
verify_jwt = false

# Supabase Auth's "Send Email" hook (Authentication -> Hooks) calls this over the public
# internet with no user JWT -- authenticity is verified inside the function via the Standard
# Webhooks signature (SEND_EMAIL_HOOK_SECRET), not verify_jwt.
[functions.send-auth-email]
verify_jwt = false

# Public, unauthenticated self-service signup endpoint by design -- there is no caller session
# yet at signup time. Always creates a brand-new organization and grants org_admin on it (never
# an existing organization or a different role), which is what keeps it safe to leave open; see
# the comment at the top of the function itself for the full reasoning.
[functions.signup-organization]
verify_jwt = false
