# Serves both authenticated user downloads/enqueues and the internal binder-export cron
# worker. pg_net sends no user JWT, so the gateway must not require one; JWT verification is
# enforced inside the function for user requests (Authorization header + getUser), and cron
# requests are gated by the shared X-CareMetric-Cron-Secret constant-time check -- the same
# split as generate-certificate-pdf.
[functions.generate-compliance-binder]
verify_jwt = false

[functions.generate-certificate-pdf]
# Serves both authenticated user downloads and the internal PDF-job cron worker. JWT
# verification is enforced inside the function for user requests; cron requests use the
# shared constant-time secret check used by the other internal workers.
verify_jwt = false

# Serves both authenticated platform_admin "process this upload now" kicks and the internal
