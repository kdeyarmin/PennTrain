# Internal cron-only endpoint invoked by pg_net from a pg_cron schedule. pg_net has no user JWT,
# so verify_jwt stays false, but the function rejects requests without X-CareMetric-Cron-Secret
# matching the CRON_SHARED_SECRET Edge Function secret.
[functions.dispatch-notifications]
verify_jwt = false

# Same cron-secret pattern as dispatch-notifications.
[functions.screen-exclusions]
verify_jwt = false

# Same cron-secret pattern as dispatch-notifications.
[functions.poll-heygen-video-statuses]
verify_jwt = false

# Supabase Auth's "Send Email" hook (Authentication -> Hooks) calls this over the public
# internet with no user JWT -- authenticity is verified inside the function via the Standard
# Webhooks signature (SEND_EMAIL_HOOK_SECRET), not verify_jwt.
[functions.send-auth-email]
verify_jwt = false

# Public, unauthenticated self-service signup endpoint by design -- there is no caller session
# yet at signup time. The function enforces Turnstile, hashed rate limits, platform signup gates,
# and invite-email verification before the org_admin can set a password.
[functions.signup-organization]
verify_jwt = false

# Real session impersonation ("log in as user") for platform_admin support use. Authorization is
# enforced inside the function itself (caller JWT must resolve to an active platform_admin
# profile), not via verify_jwt -- verify_jwt only confirms the request carries *a* valid JWT, not
# that its holder is platform_admin, so the function-level check is the real boundary either way.
[functions.impersonate-user]
verify_jwt = true

# Public, unauthenticated platform-status check (maintenance banner, /signup gating) -- exposes
# only two curated booleans, never the full platform_settings table, so there is no caller-session
# needed and nothing sensitive to protect with verify_jwt.
[functions.get-platform-status]
verify_jwt = false
