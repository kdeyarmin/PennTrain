# Internal cron-only endpoint invoked by pg_net from a pg_cron schedule. pg_net has no user JWT,
# so verify_jwt stays false, but the function rejects requests without X-CareMetric-Cron-Secret
# matching the CRON_SHARED_SECRET Edge Function secret.
[functions.dispatch-notifications]
verify_jwt = false

# Public provider callbacks. Neither provider sends a Supabase JWT; each
# function validates the provider's cryptographic signature before using a
# service-role client. Invalid or replayed events cannot mutate delivery state.
[functions.twilio-notification-webhook]
verify_jwt = false

[functions.sendgrid-notification-webhook]
verify_jwt = false

# Same cron-secret pattern as dispatch-notifications.
[functions.screen-exclusions]
verify_jwt = false

# Same cron-secret pattern as dispatch-notifications.
[functions.poll-heygen-video-statuses]
verify_jwt = false

# Platform-admin recovery endpoint. Supabase validates the caller JWT and the
# function repeats the active-role check before it can queue or dispatch work.
[functions.run-system-job]
verify_jwt = true

# Supabase Auth's "Send Email" hook (Authentication -> Hooks) calls this over the public
# internet with no user JWT -- authenticity is verified inside the function via the Standard
# Webhooks signature (SEND_EMAIL_HOOK_SECRET), not verify_jwt.
[functions.send-auth-email]
verify_jwt = false

# Hosted Supabase Auth hooks are configured in the dashboard. For local end-to-end hook
# testing, opt in by setting enabled=true and SEND_EMAIL_HOOK_SECRET_BASE64 to a base64
# encoded Standard Webhooks secret; keep disabled by default so `supabase start` works
# without developer-local email credentials.
[auth.hook.send_email]
enabled = false
uri = "http://host.docker.internal:54321/functions/v1/send-auth-email"
secrets = "env(SEND_EMAIL_HOOK_SECRET_BASE64)"

# Public, unauthenticated self-service signup endpoint by design -- there is no caller session
# yet at signup time. The function enforces Turnstile, hashed rate limits, platform signup gates,
# and invite-email verification before the org_admin can set a password.
[functions.signup-organization]
verify_jwt = false

# Real session impersonation ("log in as user") for platform_admin support use. Authorization is
# enforced inside the function itself (caller JWT must resolve to an active platform_admin
# profile), not via verify_jwt -- verify_jwt only confirms the request carries *a* valid JWT, not
# that its holder is platform_admin, so the function-level check is the real boundary either way.
[functions.impersonate-user]
verify_jwt = true

# Public, unauthenticated platform-status check (maintenance banner, /signup gating) -- exposes
# only two curated booleans, never the full platform_settings table, so there is no caller-session
# needed and nothing sensitive to protect with verify_jwt.
[functions.get-platform-status]
verify_jwt = false

# Public error intake is available before authentication so login and lazy-chunk failures are
# observable. The handler accepts only a small allowlisted, length-bounded, server-redacted
# payload and writes structured events to Supabase function logs; it performs no database writes.
[functions.report-client-error]
verify_jwt = false

# Organization/platform administrators create Stripe Checkout or Customer Portal sessions. The
# gateway verifies the JWT and the function repeats the active-role, tenant, entitlement, redirect
# origin, and idempotency checks before calling Stripe.
[functions.create-billing-session]
verify_jwt = true

# Stripe cannot present a Supabase JWT. This endpoint authenticates the exact raw request body with
# Stripe-Signature before its idempotent, out-of-order-safe event processor can mutate billing state.
[functions.stripe-billing-webhook]
verify_jwt = false

# SCIM and the public integration API use tenant-bound credentials that are hashed at rest and
# validated inside their handlers. A Supabase JWT would be the wrong authentication mechanism.
[functions.scim-provision]
verify_jwt = false

# Active organization/platform administrator JWT plus AAL2 are enforced in the handler. The
# handler proves control with a DNS TXT lookup, then uses service_role for the otherwise
# service-only verification transition; interactive callers cannot self-attest domain ownership.
[functions.verify-identity-domain]
verify_jwt = true

[functions.integration-api]
verify_jwt = false

# Public confidential intake. Turnstile, hashed IP rate limits, and server-generated
# resume/confirmation secrets are enforced in the handler before service-role RPC use.
[functions.submit-confidential-intake]
verify_jwt = false

# Internal cron worker. It requires X-CareMetric-Cron-Secret and signs each tenant webhook with the
# endpoint-specific secret held in Vault; it does not accept a caller session.
[functions.dispatch-integration-webhooks]
verify_jwt = false

# Public evidence-room guest downloads. Guests have no session; the grant token is the
# credential, and authorize_evidence_guest_artifact re-checks every fail-closed condition
# and logs the access before a short-lived signed URL is minted.
[functions.evidence-guest-download]
verify_jwt = false
