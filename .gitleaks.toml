title = "CareMetric CareBase Gitleaks configuration"

[extend]
useDefault = true

[[rules]]
id = "generic-api-key"

[[rules.allowlists]]
description = "Ignore the non-secret Phase 2 entitlement key used in database tests"
condition = "AND"
regexTarget = "secret"
regexes = ['''^phase2\.contract$''']
paths = ['''^supabase/tests/database/phase2_billing_integration\.test\.sql$''']

[[rules.allowlists]]
description = "Ignore the non-secret medication integration key used in database tests"
condition = "AND"
regexTarget = "secret"
regexes = ['''^abc123def456$''']
paths = ['''^supabase/tests/database/carebase_remediation_plan\.test\.sql$''']

[[rules.allowlists]]
description = "Ignore the non-secret Ohio personnel rule-pack identifier"
condition = "AND"
regexTarget = "secret"
regexes = ['''^oh\.rcf\.3701-16\.personnel$''']
paths = [
  '''^artifacts/caremetric-carebase/src/pages/admin/EnterpriseFoundation\.tsx$''',
  '''^supabase/tests/database/platform_intelligence_web_push_and_lifecycle\.test\.sql$''',
]
