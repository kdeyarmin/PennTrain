name: Deploy migrations

# Deploys committed migrations AND edge functions to the production Supabase project -- but
# only after CI has validated the exact commit on main. Root cause this closes (see
# MIGRATION_DEPLOYMENT_AUDIT.md): CI validated the migration chain on a throwaway local stack
# but nothing deployed it to the remote, so migrations merged to main could sit undeployed
# indefinitely. PT-068 extended the same fix to edge functions, which previously deployed
# only by manual CLI invocation (DEPLOYMENT.md) and could likewise sit undeployed.
#
# Why `workflow_run` and not `push`: triggering directly on push to main would let
# `supabase db push` mutate production in parallel with -- and possibly before -- the CI
# `database` job that reapplies and tests the whole migration chain (reset, tests, lint,
# advisors). Instead this runs only after the "CI" workflow finishes successfully on main, and
# checks out exactly the SHA CI validated, so production is never changed ahead of validation.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_ACCESS_TOKEN  -- a Supabase personal access token (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_DB_PASSWORD   -- the project's database password (Project Settings -> Database)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run against the database at once; queue them instead of cancelling,
# since cancelling a half-applied `db push` is worse than waiting.
concurrency:
  group: deploy-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gate on a *successful* CI run on main, or a manual dispatch that is itself on main. This
    # keeps production changes behind CI validation and prevents deploying an arbitrary ref.
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: xsqobvvreaovwibxwyvv
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Deploy exactly the commit CI validated; for a manual dispatch, main's tip. Never a
          # caller-selected feature ref, so unmerged migrations cannot reach production.
          ref: ${{ github.event.workflow_run.head_sha || 'refs/heads/main' }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version

      # Pin both the setup action and the CLI version to match the CI database job, so
      # push behavior reproduces what CI validated.
      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.109.1

      - name: Verify deploy secrets are configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD repository secrets must be set before this workflow can deploy. See MIGRATION_DEPLOYMENT_AUDIT.md."
            exit 1
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # --include-all backfills any pending migration whose version sorts before one already
      # applied on the remote (the out-of-order situation this project hit); a plain `db push`
      # would refuse it and leave drift, which the verify step below would then flag.
      - name: Push pending migrations
        run: supabase db push --include-all

      - name: Verify no migration drift remains
        run: node scripts/check-migration-drift.mjs

      # Deploy every edge function with its supabase/config.toml settings (verify_jwt et al.)
      # after the database is migrated, so functions never run ahead of the schema they need.
      # Deploy success implies every local function directory now exists remotely at this
      # commit's content; a content-level drift check (deployed hash vs local) remains open
      # under PT-068's residual slice.
      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
