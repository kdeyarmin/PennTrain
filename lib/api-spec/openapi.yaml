      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Facility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facility"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFacility
      tags: [facilities]
      summary: Update facility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFacilityBody"
      responses:
        "200":
          description: Updated facility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facility"
    delete:
      operationId: deleteFacility
      tags: [facilities]
      summary: Delete facility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /facilities/{id}/compliance-summary:
    get:
      operationId: getFacilityComplianceSummary
      tags: [facilities]
      summary: Get compliance summary for a facility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Facility compliance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacilityComplianceSummary"

  # Employees
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
