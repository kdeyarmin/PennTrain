      parameters:
        - name: employeeId
          in: query
          schema:
            type: integer
        - name: facilityId
          in: query
          schema:
            type: integer
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of practicums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Practicum"
    post:
      operationId: createPracticum
      tags: [practicums]
      summary: Create a practicum record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePracticumBody"
      responses:
        "201":
          description: Practicum created
          content:
