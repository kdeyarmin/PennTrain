        - name: organizationId
          in: query
          schema:
            type: integer
        - name: trainingTypeId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: dueBefore
          in: query
          schema:
            type: string
        - name: dueAfter
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of training records
