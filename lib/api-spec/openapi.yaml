              schema:
                $ref: "#/components/schemas/TrainingRecord"

  # Training Matrix
  /training-matrix:
    get:
      operationId: getTrainingMatrix
      tags: [training-records]
      summary: Get training matrix for a facility
      parameters:
        - name: facilityId
          in: query
          schema:
            type: integer
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: administersMedications
          in: query
          schema:
            type: boolean
        - name: trainerOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Training matrix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingMatrix"

