      tags: [training-records]
      summary: Get training record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Training record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRecord"
    patch:
      operationId: updateTrainingRecord
      tags: [training-records]
      summary: Update training record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainingRecordBody"
      responses:
        "200":
          description: Updated training record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRecord"
    delete:
      operationId: deleteTrainingRecord
      tags: [training-records]
      summary: Delete training record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /training-records/{id}/verify:
    post:
      operationId: verifyTrainingRecord
      tags: [training-records]
      summary: Verify a training record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Training record verified
          content:
